name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build workspace packages
        run: |
          yarn workspace @todos/core build
          yarn workspace @todos/store build
          yarn workspace @todos/firebase build

      - name: Type check (TSC)
        run: yarn workspaces foreach --all --parallel exec 'test -d src && npx tsc --noEmit || true'

      - name: Run tests
        run: yarn test

  e2e-smoke:
    name: E2E Smoke Tests (API + MCP)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build workspace packages
        run: |
          yarn workspace @todos/core build
          yarn workspace @todos/store build
          yarn workspace @todos/firebase build

      - name: Run API e2e smoke tests
        run: yarn workspace @todos/api test:e2e:smoke

      - name: Run MCP e2e smoke tests
        run: yarn workspace @todos/mcp test:e2e:smoke

      - name: Upload e2e report artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-reports
          path: tools/e2e/reports/
          retention-days: 7
